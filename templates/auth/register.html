{% extends "base.html" %}

{% block title %}Register — ProjectForge{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div class="text-center">
            <svg class="mx-auto h-12 w-12 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
            <h2 class="mt-4 text-3xl font-extrabold text-gray-900">Create your account</h2>
            <p class="mt-2 text-sm text-gray-600">
                Join ProjectForge and start managing your projects
            </p>
        </div>

        <div class="bg-white shadow-lg rounded-lg px-8 py-8 border border-gray-200">
            <form class="space-y-5" method="POST" action="/auth/register">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input id="username" name="username" type="text" required autocomplete="username"
                        class="block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 sm:text-sm"
                        placeholder="Choose a username"
                        value="{{ form_data.username if form_data and form_data.username else '' }}">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                        class="block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 sm:text-sm"
                        placeholder="you@example.com"
                        value="{{ form_data.email if form_data and form_data.email else '' }}">
                </div>

                <div>
                    <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full name</label>
                    <input id="full_name" name="full_name" type="text" autocomplete="name"
                        class="block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 sm:text-sm"
                        placeholder="Your full name"
                        value="{{ form_data.full_name if form_data and form_data.full_name else '' }}">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" required autocomplete="new-password"
                        class="block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 sm:text-sm"
                        placeholder="Create a password">
                    <p class="mt-1 text-xs text-gray-500">Must be at least 8 characters long</p>
                </div>

                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm password</label>
                    <input id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password"
                        class="block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 sm:text-sm"
                        placeholder="Confirm your password">
                </div>

                <div>
                    <button type="submit"
                        class="flex w-full justify-center rounded-md bg-primary-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors duration-150">
                        Create account
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center text-sm text-gray-600">
            Already have an account?
            <a href="/auth/login" class="font-medium text-primary-600 hover:text-primary-500 transition-colors duration-150">Sign in instead</a>
        </p>
    </div>
</div>
{% endblock %}
